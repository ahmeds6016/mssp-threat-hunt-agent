name: "Ransomware Hunt Playbook"
description: "Multi-stage hunt for ransomware indicators: encryption patterns, shadow copy deletion, lateral movement, and C2 communication."
severity: critical
techniques:
  - T1486  # Data Encrypted for Impact
  - T1490  # Inhibit System Recovery
  - T1021.002  # Remote Services: SMB/Windows Admin Shares
  - T1047  # Windows Management Instrumentation
  - T1059.001  # PowerShell
  - T1105  # Ingress Tool Transfer

steps:
  - action: hunt
    hypothesis: "Look for file encryption patterns including mass file renames and extensions associated with ransomware (.encrypted, .locked, .crypt)"
    techniques: [T1486]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Check for shadow copy deletion via vssadmin, wmic, or PowerShell — a common ransomware precursor"
    techniques: [T1490]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Search for lateral movement via PsExec, WMI, or SMB admin shares indicating ransomware propagation"
    techniques: [T1021.002, T1047]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Detect suspicious PowerShell execution including encoded commands, download cradles, or execution policy bypasses"
    techniques: [T1059.001]
    time_range: "last 7 days"

  - action: ioc_sweep
    description: "Sweep for known ransomware C2 domains and callback IPs"
    iocs: []
