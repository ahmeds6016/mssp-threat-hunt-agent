name: "Credential Theft Playbook"
description: "Hunt for credential harvesting: LSASS dumping, Kerberoasting, password spraying, and credential access via DCSync."
severity: high
techniques:
  - T1003.001  # OS Credential Dumping: LSASS Memory
  - T1003.006  # OS Credential Dumping: DCSync
  - T1558.003  # Steal or Forge Kerberos Tickets: Kerberoasting
  - T1110.003  # Brute Force: Password Spraying

steps:
  - action: hunt
    hypothesis: "Detect LSASS memory access via suspicious processes (procdump, mimikatz, comsvcs.dll) or direct memory read attempts"
    techniques: [T1003.001]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Search for Kerberoasting activity including TGS requests for service accounts with weak SPNs"
    techniques: [T1558.003]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Identify password spray patterns: many failed logins across different accounts from the same IP, followed by successful auth"
    techniques: [T1110.003]
    time_range: "last 7 days"

  - action: hunt
    hypothesis: "Check for DCSync replication requests from non-domain controller machines indicating credential theft"
    techniques: [T1003.006]
    time_range: "last 7 days"
